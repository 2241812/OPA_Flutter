name: opa
description: OPA - OpenSSH Pocket Agent. A Flutter app that makes SSH connectivity effortless.
version: 0.2.4+1

environment:
  sdk: ">=3.10.4 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # SSH client - password + key auth, keep-alive, port forwarding, built-in SFTP
  dartssh2: ^2.8.0

  # Terminal emulator widget - VT100, 256-color, scrollback, touch
  xterm: ^4.0.0

  # Ed25519 key pair generation (used by ssh_key_encoder.dart)
  pinenacl: ^0.6.0

  # Secure on-device storage (Android Keystore / iOS Keychain)
  flutter_secure_storage: ^9.2.0

  # Local NoSQL database for profiles & commands
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.6.0

  # UUID generation for unique IDs
  uuid: ^4.5.1

  # Onboarding first-launch detection
  shared_preferences: ^2.3.0

  # Typography - JetBrains Mono (terminal) + Inter (UI)
  google_fonts: ^6.2.0

  # Declarative spring/fade animations
  flutter_animate: ^4.5.0

  # HTTP client - GitHub Releases API for update checks
  http: ^1.2.0

  # Launch APK download URLs in the browser
  url_launcher: ^6.3.0

  # Read the installed app version at runtime (for update checks)
  package_info_plus: ^8.0.0

  # Biometric authentication (fingerprint / face)
  local_auth: ^2.3.0


  # Tailscale embedded networking -- WireGuard tailnet without separate app
  tailscale: ^0.5.0

  # File system paths (used for Tailscale state directory)
  path_provider: ^2.1.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
